<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoostOwl - Smart Business Solutions</title>
    <meta name="description" content="Supercharge your business with BoostOwl's all-in-one CRM, Inventory, and Smart Chatbot systems." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            colors: {
              boost: {
                dark: '#00383d', // Darkest Teal (Background)
                teal: '#005b5b', // Primary Brand Color
                light: '#e0f2f1', // Light Teal/White
                accent: '#00dfa2', // Neon Green (Logo Accent)
                accentHover: '#00bf8a',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #00383d;
      }
      ::-webkit-scrollbar-thumb {
        background: #005b5b;
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00dfa2;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.34.0"
  }
}
</script>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased selection:bg-boost-accent selection:text-boost-dark">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
